---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-cache-wellcake-io-v1beta1-valkeycluster
  failurePolicy: Fail
  name: mvalkeycluster-v1beta1.kb.io
  rules:
  - apiGroups:
    - cache.wellcake.io
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - valkeyclusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-cache-wellcake-io-v1beta1-valkeyacl
  failurePolicy: Fail
  name: vvalkeyacl-v1beta1.kb.io
  rules:
  - apiGroups:
    - cache.wellcake.io
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - valkeyacls
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-cache-wellcake-io-v1beta1-valkeycluster
  failurePolicy: Fail
  name: vvalkeycluster-v1beta1.kb.io
  rules:
  - apiGroups:
    - cache.wellcake.io
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - valkeyclusters
  sideEffects: None
