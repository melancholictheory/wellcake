            - message: sentinel is required when topology is Sentinel
              rule: self.topology != 'Sentinel' || has(self.sentinel)
            - message: sentinel is only valid when topology is Sentinel
              rule: self.topology == 'Sentinel' || !has(self.sentinel)
            - message: replicateFrom only supported for Standalone or Replication
                topology
              rule: '!has(self.replicateFrom) || self.topology == ''Standalone'' ||
                self.topology == ''Replication'''
            - message: replicateFrom.caSecret requires replicateFrom.tls=true and
                spec.tls.enabled=true
              rule: '!has(self.replicateFrom) || !has(self.replicateFrom.caSecret)
                || (self.replicateFrom.tls && has(self.tls) && self.tls.enabled)'
            - message: storage.medium=Memory is ephemeral and not allowed with the
                Durable profile
              rule: '!has(self.storage) || !has(self.storage.medium) || self.storage.medium
                != ''Memory'' || self.profile != ''Durable'''
            - message: perShardWorkload is only valid when topology is Cluster
              rule: '!has(self.perShardWorkload) || self.topology == ''Cluster'''
            - message: shards can only grow unless perShardWorkload=true (per-StatefulSet
                layout supports clean shard scale-down; single-STS removes replicas,
                not a shard — see ADR 0005 / C4)
              rule: '!has(self.shards) || !has(oldSelf.shards) || self.shards >= oldSelf.shards
                || (has(self.perShardWorkload) && self.perShardWorkload)'
            - message: perShardWorkload is immutable
              rule: has(self.perShardWorkload) == has(oldSelf.perShardWorkload) &&
                (!has(self.perShardWorkload) || self.perShardWorkload == oldSelf.perShardWorkload)
          status:
            description: ValkeyClusterStatus defines the observed state of ValkeyCluster.
            properties:
              clusterInitialized:
                description: |-
                  ClusterInitialized is true once `valkey-cli --cluster create` succeeded
                  for Cluster topology. The bootstrap is then never repeated.
                type: boolean
              conditions:
                description: |-
                  Conditions represent the current state of the resource.
                  Well-known types: Available, Progressing, Degraded, ClusterInitialized.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              internalEndpoint:
                description: |-
                  InternalEndpoint is the in-cluster client endpoint (host:port) of the
                  client Service, for consumers to connect to. Surfaced here so wrappers
                  (e.g. a Crossplane Composition) can project it without recomputing names.
                type: string
              lastAppliedReplicas:
                description: |-
                  LastAppliedReplicas is the total replica count last successfully
                  reflected in the running cluster (Cluster topology). Drives scale-up
                  detection: when totalReplicas(spec) > LastAppliedReplicas the operator
                  runs a one-shot add-node Job, then advances this counter.
                format: int32
                type: integer
              lastFailoverToken:
                description: |-
                  LastFailoverToken is the value of the valkey.wellcake.io/failover annotation
                  the operator last acted on (Replication topology). Used to run a manual
                  failover exactly once per request.
                type: string
              lastPasswordRotationToken:
                description: |-
                  LastPasswordRotationToken is the value of the valkey.wellcake.io/rotate-password
                  annotation the operator last acted on. Used to run an in-place password
                  rotation (live CONFIG SET requirepass/masterauth, no restart) exactly once
                  per request.
                type: string
              lastReshardToken:
                description: |-
                  LastReshardToken is the value of the valkey.wellcake.io/reshard annotation the
                  operator last acted on (Cluster topology). Used to run a manual reshard
                  exactly once per request.
                type: string
              lastTLSCertFingerprint:
                description: |-
                  LastTLSCertFingerprint is the SHA-256 fingerprint of the TLS leaf cert the
                  operator last reloaded onto the live pods. When cert-manager renews the
                  cert Secret this no longer matches, triggering an in-place TLS reload
                  (live CONFIG SET tls-cert-file/tls-key-file/tls-ca-cert-file, no restart).
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is a quick high-level summary.
                enum:
                - Pending
                - Creating
                - Ready
                - Updating
                - Failed
                - Hibernated
                type: string
              primary:
                description: Primary holds the pod currently acting as primary (Replication/Sentinel
                  topologies).
                type: string
              primaryDownSince:
                description: |-
                  PrimaryDownSince is when the operator first observed the primary
                  unreachable. It debounces operator-driven failover: a replica is promoted
                  only after the primary has been down for at least the failover threshold,
                  so a primary that is merely briefly busy (slow BGSAVE, GC pause) is not
                  prematurely failed over. Cleared once a master is reachable again.
                format: date-time
                type: string
              readyReplicas:
                description: ReadyReplicas is the count of ready Valkey pods.
                format: int32
                type: integer
              readyShards:
                description: ReadyShards reports how many shards have a Ready primary
                  (Cluster topology only).
                format: int32
                type: integer
              shardDetails:
                description: |-
                  ShardDetails reports per-shard topology, slot ownership and health
                  (Cluster topology only). Refreshed by the reconciler on every pass
                  via `CLUSTER NODES`. Empty when topology != Cluster or the cluster
                  has not bootstrapped yet.
                items:
                  description: |-
                    ShardStatus describes a single shard (one primary plus its replicas) in a
                    Cluster-topology ValkeyCluster.
                  properties:
                    health:
                      description: |-
                        Health summarises the shard state: Ready, Degraded (primary up, some
                        replica down), Down (primary unreachable). Unknown when the survey
                        couldn't talk to any pod.
                      enum:
                      - Unknown
                      - Ready
                      - Degraded
                      - Down
                      type: string
                    index:
                      description: |-
                        Index is the operator-assigned shard ordinal, stable across reconciles.
                        It is the order in which we encountered the master in `CLUSTER NODES`,
                        not a Valkey-internal identifier.
                      format: int32
                      type: integer
                    maxLagBytes:
                      description: |-
                        MaxLagBytes is the largest (primaryOffset - replicaOffset) across the
                        shard's replicas. Equals 0 when there are no replicas or every replica
                        matches the primary exactly.
                      format: int64
                      type: integer
                    primary:
                      description: Primary is the pod name (e.g. "demo-3") that owns
                        this shard's slots.
                      type: string
                    primaryNodeID:
                      description: |-
                        PrimaryNodeID is the Valkey-internal cluster node ID of the primary.
                        Useful for `valkey-cli --cluster reshard --cluster-from <id>` operations.
                      type: string
                    primaryOffset:
                      description: |-
                        PrimaryOffset is the primary's master_repl_offset at the last survey,
                        reported by INFO replication. Useful as a freshness signal and as the
                        baseline for replica lag below.
                      format: int64
                      type: integer
                    replicaOffsets:
                      description: |-
                        ReplicaOffsets enumerates each replica's repl offset alongside the
                        primary's, so lag can be calculated per replica.
                      items:
                        description: ReplicaOffset records one replica's repl offset
                          alongside its pod name.
                        properties:
                          offset:
                            format: int64
                            type: integer
                          pod:
                            type: string
                        required:
                        - offset
                        - pod
                        type: object
                      type: array
                    replicas:
                      description: Replicas lists pod names that replicate this primary.
                      items:
                        type: string
                      type: array
                    slotCount:
                      description: SlotCount is the total slot count owned by this
                        shard.
                      format: int32
                      type: integer
                    slotRanges:
                      description: |-
                        SlotRanges enumerates the slot ranges owned by the primary, e.g.
                        ["0-5460", "12000-12100"]. A shard with zero slots (freshly added by
                        scale-up but not yet reshard'ed) shows an empty list.
                      items:
                        type: string
                      type: array
                  required:
                  - index
                  - primary
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - index
                x-kubernetes-list-type: map
              shards:
                description: Shards reports the configured number of shards (Cluster
                  topology only).
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
