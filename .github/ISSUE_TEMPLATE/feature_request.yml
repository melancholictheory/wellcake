name: Feature request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the use case or pain point. "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the operator to do? Sketch the CRD fields / behavior if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: dropdown
    id: topology
    attributes:
      label: Which topology does this affect?
      multiple: true
      options:
        - Standalone
        - Replication
        - Sentinel
        - Cluster
        - All / not topology-specific
  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
