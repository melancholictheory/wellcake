{{- if .Values.rbac.create -}}
{{- $namespaceScoped := eq (include "valkey-operator.namespaceScoped" .) "true" -}}
{{- $rules := list
  (dict "apiGroups" (list "") "resources" (list "configmaps" "secrets" "services") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "") "resources" (list "persistentvolumeclaims") "verbs" (list "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "") "resources" (list "events") "verbs" (list "create" "patch"))
  (dict "apiGroups" (list "") "resources" (list "pods") "verbs" (list "delete" "get" "list" "watch"))
  (dict "apiGroups" (list "apps") "resources" (list "statefulsets") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "batch") "resources" (list "jobs") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "batch") "resources" (list "cronjobs") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "monitoring.coreos.com") "resources" (list "servicemonitors") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "cache.wellcake.io") "resources" (list "valkeyclusters") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "cache.wellcake.io") "resources" (list "valkeyclusters/finalizers") "verbs" (list "update"))
  (dict "apiGroups" (list "cache.wellcake.io") "resources" (list "valkeyclusters/status") "verbs" (list "get" "patch" "update"))
  (dict "apiGroups" (list "cache.wellcake.io") "resources" (list "valkeyacls") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "cache.wellcake.io") "resources" (list "valkeyacls/finalizers") "verbs" (list "update"))
  (dict "apiGroups" (list "cache.wellcake.io") "resources" (list "valkeyacls/status") "verbs" (list "get" "patch" "update"))
  (dict "apiGroups" (list "networking.k8s.io") "resources" (list "networkpolicies") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
  (dict "apiGroups" (list "policy") "resources" (list "poddisruptionbudgets") "verbs" (list "create" "delete" "get" "list" "patch" "update" "watch"))
}}
---
{{- if $namespaceScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "valkey-operator.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.watchNamespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
rules:
{{- toYaml $rules | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "valkey-operator.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.watchNamespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "valkey-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "valkey-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "valkey-operator.fullname" . }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
rules:
{{- toYaml $rules | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "valkey-operator.fullname" . }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "valkey-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "valkey-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.leaderElection.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "valkey-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "valkey-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "valkey-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "valkey-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
